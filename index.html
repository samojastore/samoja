<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMOJA</title>
    <style>
        html{
            scroll-behavior: smooth;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align:center;
        }
        
        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        h1{
            font-size:70px;
            margin:0;
        }

        p{
            font-size:20px;
            color:#ccc;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        #koleksi{
            padding:100px 20px;
        }

        .produk-container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .produk{
            width:300px;
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
        }

        .produk img{
            width:100%;
        }

        .produk h3{
            margin:15px 0 10px;
        }

        .produk p{
            color:#ccc;
        }

        .produk a{
            display:inline-block;
            margin:15px;
            padding:10px 20px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:8px;
        }

        /* Tombol melayang di kanan bawah */
        #tombol-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background-color: #656769;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 9999;
        }

        /* Kotak chat melayang */
        #wadah-chat {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            z-index: 9999;
            font-family: sans-serif;
            color: black;
        }

        /* Menyembunyikan elemen */
        .tersembunyi {
            display: none !important;
        }

        /* Gaya area pesan internal */
        #header-chat { background: #656769; color: white; padding: 10px; display: flex; justify-content: space-between; border-radius: 10px 10px 0 0; }
        #header-chat h4 { margin: 0; }
        #header-chat button { margin: 0; padding: 0 5px; font-size: 14px; background: transparent; color: white; }
        #area-pesan { flex: 1; padding: 10px; overflow-y: auto; background: #f9f9f9; text-align: left; }
        #input-grup { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; border-radius: 0 0 10px 10px; }
        #teks-chat { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        #input-grup button { margin: 0 0 0 5px; padding: 8px 15px; font-size: 14px; background: #656769; color: white; }

        /* Gaya baru untuk balon chat (bubble chat) biar estetik */
        .msg-line { margin: 8px 0; padding: 6px 10px; border-radius: 6px; font-size: 13px; max-width: 85%; word-wrap: break-word; }
        .msg-anda { background: #e2f0cb; margin-left: auto; text-align: right; color: #333; }
        .msg-admin { background: #ffffff; border: 1px solid #ddd; margin-right: auto; text-align: left; color: #333; }

        /* ======================================================== */
        /* PERBAIKAN BARU: ATURAN KHUSUS BIAR HP BISA 2 KOLOM      */
        /* ======================================================== */
        @media screen and (max-width: 600px) {
            #koleksi {
                padding: 60px 10px;
            }
            .produk-container {
                gap: 12px;
                padding: 0 5px;
            }
            .produk {
                width: calc(50% - 6px); 
                border-radius: 10px;
            }
            .produk h3 {
                font-size: 15px;
                margin: 10px 0 5px;
            }
            .produk p {
                font-size: 13px;
                margin: 0;
            }
            .produk a {
                margin: 10px 5px;
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>SAMOJA</h1>
    <p>
        Local Streetwear Brand<br>Designed for Everyday Confidence
    </p>
    
    <a href="#koleksi">
        <button>Lihat Koleksi</button>
    </a>
