        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align:center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.50), rgba(0, 0, 0, 0.50)), url('background/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        h1{
            font-size:70px;
            margin:0;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            animation: sliceMuncul 3s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes sliceMuncul {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        p1{
            display: block;
            font-size: 20px;
            color: #ccc;
            font-family: monospace;
            margin-top: 10px;
        }

        .efek-ngetik {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid transparent;
            width: 0;
        }

        .baris-1 {
            animation: 
                ngetikBaris1 1s steps(22) forwards,
                kedipKursor 0.6s step-end 3;
        }

        .baris-2 {
            animation: 
                ngetikBaris2 1.5s steps(31) 1.1s forwards,
                kedipKursor 0.75s step-end 1s infinite alternate;
        }

        @keyframes ngetikBaris1 {
            from { width: 0; border-color: white; }
            to { width: 100%; border-color: transparent; }
        }

        @keyframes ngetikBaris2 {
            from { width: 0; border-color: white; }
            to { width: 100%; border-color: white; }
        }

        @keyframes kedipKursor {
            50% { border-color: transparent; }
        }   

        p{
            font-size:20px;
            color:#ccc;
        }

        .hero button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight: bold;
            background: white;
            color: black;
            cursor:pointer;
            transition: 0.3s ease;
        }

        .hero button:hover {
            background-color: #ccc;
            transform: scale(1.05);
        }

        .kontak-melayang {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            z-index: 9999;
        }

        .kontak-melayang a {
            text-decoration: none;
        }

        .kontak-melayang button {
            margin: 0;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            width: 130px;
        }

        .btn-wa {
            background-color: #25D366;
        }

        .btn-ig {
            background-image: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .kontak-melayang button:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.6);
            filter: brightness(1.1);
        }

        #koleksi{
            padding:100px 20px;
        }

        .produk-container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .produk{
            width:300px;
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
        }

        .produk img{
            width:100%;
        }

        .produk h3{
            margin:15px 0 10px;
        }

        .produk p{
            color:#ccc;
        }

        .produk a{
            display:inline-block;
            margin:15px;
            padding:10px 20px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:8px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease; 
        }

        .produk a:hover {
            background-color: #ccc;
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0px 8px 18px rgba(0, 0, 0, 0.5);
        }

        @media screen and (max-width: 600px) {
            #koleksi {
                padding: 60px 10px;
            }
            .produk-container {
                gap: 12px;
                padding: 0 5px;
            }
            .produk {
                width: calc(50% - 6px); 
                border-radius: 10px;
            }
            .produk h3 {
                font-size: 15px;
                margin: 10px 0 5px;
            }
            .produk p {
                font-size: 13px;
                margin: 0;
            }
            .produk a {
                margin: 10px 5px;
                padding: 8px 10px;
                font-size: 12px;
            }
            .produk a:hover {
                transform: translateY(-2px) scale(1.02);
            }
            .kontak-melayang {
                bottom: 15px;
                right: 15px;
                gap: 8px;
            }
            .kontak-melayang button {
                padding: 10px 18px;
                font-size: 12px;
                width: 110px;
            }
        }
    </style>
</head>
