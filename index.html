<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Live Chat Sendiri</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #kotak-chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Live Chat Room</h2>
    <div id="kotak-chat"></div>
    <input type="text" id="input-pesan" placeholder="Ketik pesan..." />
    <button onclick="kirim()">Kirim</button>

    <!-- Memanggil library socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const kotakChat = document.getElementById('kotak-chat');
        const inputPesan = document.getElementById('input-pesan');

        // Fungsi saat tombol kirim ditekan
        function kirim() {
            const pesan = inputPesan.value;
            if(pesan) {
                // Kirim event 'kirim-pesan' ke server
                socket.emit('kirim-pesan', pesan);
                inputPesan.value = '';
            }
        }

        // Mendengarkan kiriman dari server jika ada 'pesan-baru'
        socket.on('pesan-baru', (msg) => {
            const elemenPesan = document.createElement('p');
            elemenPesan.textContent = msg;
            kotakChat.appendChild(elemenPesan);
        });
    </script>
</body>
</html>
