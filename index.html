<!DOCTYPE html>

        body{
            margin:0;

            background-color: #111;
            color: white;
            text-align:center;
        }
        
        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;

        }

        h1{
            font-size:70px;

        }

        p{

        }

        button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        #koleksi{
            padding:100px 20px;
        }

        .produk-container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .produk{
            width:300px;
            background:#1a1a1a;
            border-radius:15px;
            overflow:hidden;
        }

        .produk img{
            width:100%;
        }

        .produk h3{
            margin:15px 0 10px;
        }

        .produk p{
            color:#ccc;
        }

        .produk a{
            display:inline-block;
            margin:15px;
            padding:10px 20px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:8px;
        }

        /* Aturan khusus HP biar bisa 2 kolom */
        @media screen and (max-width: 600px) {
            #koleksi {
                padding: 60px 10px;
            }
            .produk-container {
                gap: 12px;
                padding: 0 5px;
            }
            .produk {
                width: calc(50% - 6px); 
                border-radius: 10px;
            }
            .produk h3 {
                font-size: 15px;
                margin: 10px 0 5px;
            }
            .produk p {
                font-size: 13px;
                margin: 0;
            }
            .produk a {
                margin: 10px 5px;
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
