<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Kontak</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .contact-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            margin-bottom: 50px;
        }
        .contact-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 30px;
            min-width: 250px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .contact-card:hover { transform: translateY(-5px); border-color: var(--warna-utama); }
        .contact-card i { font-size: 50px; color: var(--warna-utama); margin-bottom: 20px; }
        .contact-card a {
            display: inline-block;
            background: var(--warna-utama);
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 15px;
        }
        .contact-form {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 30px;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            margin-bottom: 15px;
        }
        .contact-form button {
            background: var(--warna-utama);
            color: white;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="container">
    <div class="page-header">
        <h1>Hubungi Kami</h1>
        <p>Pilih cara favoritmu untuk terhubung dengan SAMOJA</p>
    </div>
    <div class="contact-grid">
        <div class="contact-card">
            <i class="fab fa-whatsapp"></i>
            <h3>WhatsApp</h3>
            <p>Chat cepat untuk pemesanan</p>
            <a href="https://wa.me/6289512890115" target="_blank">Chat Sekarang</a>
        </div>
        <div class="contact-card">
            <i class="fab fa-instagram"></i>
            <h3>Instagram</h3>
            <p>Lihat portofolio & behind the scene</p>
            <a href="https://www.instagram.com/samojaapprl/" target="_blank">@samojaapprl</a>
        </div>
        <div class="contact-card">
            <i class="fas fa-envelope"></i>
            <h3>Email</h3>
            <p>Untuk kerjasama</p>
            <a href="#">Email</a>
        </div>
    </div>
    <div class="contact-form">
        <h2>Kirim Pesan Langsung</h2>
        <form id="contactForm">
            <input type="text" id="nama" placeholder="Nama lengkap" required>
            <input type="email" id="email" placeholder="Email (opsional)">
            <textarea id="pesan" placeholder="Tulis pesan Anda..." rows="4" required></textarea>
            <button type="submit">Kirim via WhatsApp</button>
        </form>
    </div>
</div>

<div class="floating-social">
    <a href="https://wa.me/6289512890115" target="_blank" class="wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/samojaapprl/" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<div id="footer"></div>

<script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const nama = document.getElementById("nama").value;
        const email = document.getElementById("email").value;
        const pesan = document.getElementById("pesan").value;
        let text = `Halo SAMOJA, saya ${nama} ingin bertanya:\n\n${pesan}`;
        if (email) text += `\n\nEmail: ${email}`;
        window.open(`https://api.whatsapp.com/send?phone=6289512890115&text=${encodeURIComponent(text)}`, "_blank");
    });
    fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
    fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>
<script src="header.js"></script>
</body>
</html>
