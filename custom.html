<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Kustomisasi Desain</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .custom-form {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .row-dua {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .row-dua .form-group {
            flex: 1;
        }
        hr {
            border-color: #333;
            margin: 20px 0;
        }
        .btn-submit {
            background-color: var(--warna-utama);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .info-harga {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin: 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: var(--warna-utama);
        }
        @media (max-width: 768px) {
            .custom-form { padding: 20px; }
            .row-dua { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="container">
    <div class="page-header">
        <h1>Kustomisasi Desain</h1>
        <p>Buat desain sablon sesuai keinginanmu. Harga akan dihitung otomatis.</p>
    </div>

    <div class="custom-form">
        <form id="customForm">
            <!-- Data diri -->
            <div class="form-group">
                <label>Nama Lengkap <span style="color:#e07c3c;">*</span></label>
                <input type="text" id="nama" required placeholder="Contoh: Andi Prasetyo">
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp (untuk konfirmasi) <span style="color:#e07c3c;">*</span></label>
                <input type="tel" id="nowa" required placeholder="081234567890">
            </div>

            <hr>

            <h3 style="color: var(--warna-utama); text-align: center;">Detail Produk</h3>

            <div class="form-group">
                <label>Jenis Kaos <span style="color:#e07c3c;">*</span></label>
                <select id="jenisKaos" required>
                    <option value="24s">Cotton Combed 24s (Rp 41.000)</option>
                    <option value="30s">Cotton Combed 30s (Rp 36.000)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Model Lengan <span style="color:#e07c3c;">*</span></label>
                <select id="modelLengan" required>
                    <option value="pendek">Lengan Pendek (Short Sleeve) - harga normal</option>
                    <option value="panjang">Lengan Panjang (Long Sleeve) - tambah Rp 8.000</option>
                </select>
            </div>

            <div class="form-group">
                <label>Warna Kaos</label>
                <input type="text" id="warnaKaos" placeholder="Contoh: Hitam, Putih, Navy">
            </div>

            <div class="form-group">
                <label>Ukuran Kaos</label>
                <select id="ukuranKaos">
                    <option value="">Pilih ukuran</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="2XL">2XL + Rp 5.000</option>
                    <option value="3XL">3XL + Rp 11.000</option>
                    <option value="4XL">4XL + Rp 17.000</option>
                </select>
            </div>

            <hr>

            <h3 style="color: var(--warna-utama); text-align: center;">Detail Sablon (Depan & Belakang)</h3>

            <div class="row-dua">
                <div class="form-group">
                    <label>Ukuran Sablon Depan</label>
                    <select id="ukuranSablonDepan">
                        <option value="none">Tidak ada sablon depan</option>
                        <option value="Logo">Logo (Rp 10.000)</option>
                        <option value="A5">A5 (Rp 15.000)</option>
                        <option value="A4">A4 (Rp 25.000)</option>
                        <option value="A3">A3 (Rp 35.000)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ukuran Sablon Belakang</label>
                    <select id="ukuranSablonBelakang">
                        <option value="none">Tidak ada sablon belakang</option>
                        <option value="A5">A5 (Rp 15.000)</option>
                        <option value="A4">A4 (Rp 25.000)</option>
                        <option value="A3">A3 (Rp 35.000)</option>
                    </select>
                </div>
            </div>

            <div class="row-dua">
                <div class="form-group">
                    <label>Posisi Sablon Depan</label>
                    <input type="text" id="posisiDepan" placeholder="Contoh: Tengah dada, kiri atas">
                </div>
                <div class="form-group">
                    <label>Posisi Sablon Belakang</label>
                    <input type="text" id="posisiBelakang" placeholder="Contoh: Punggung atas, tengah">
                </div>
            </div>
            <p>Note : Jika Ukuran Sablon Belakang A3 atau A4 maka Free Logo (Sablon Depan) <br> Total akan terpotong/discount otomatis</p>
            

            <div class="form-group">
                <label>Catatan Tambahan (warna sablon, referensi, dll)</label>
                <textarea id="catatan" rows="3"></textarea>
            </div>

            <!-- Info harga total -->
            <div class="info-harga" id="totalHargaDisplay">Total: Rp 0</div>

            <button type="submit" class="btn-submit">Kirim Permintaan via WhatsApp</button>
        </form>
    </div>
</div>

<div class="floating-social">
    <a href="https://wa.me/6289512890115" target="_blank" class="wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/samojaapprl/" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<div id="footer"></div>

<script>
    // ========== HARGA DASAR & TAMBAHAN ==========
    const hargaKaos = { "24s": 41000, "30s": 36000 };
    const tambahanLengan = { "pendek": 0, "panjang": 8000 };
    const tambahanUkuran = {
        "2XL": 5000,
        "3XL": 11000,
        "4XL": 17000
    };
    // Harga satuan sablon (sebelum diskon)
    const hargaSablon = {
        "Logo": 10000,
        "A5": 15000,
        "A4": 25000,
        "A3": 35000,
        "none": 0
    };

    // Fungsi hitung total dengan promo: jika sablon belakang A3/A4 dan sablon depan Logo, maka gratis (diskon 10000)
    function hitungTotal() {
        // Harga dasar kaos
        const kaos = document.getElementById("jenisKaos").value;
        let hargaDasar = hargaKaos[kaos] || 0;
        
        // Model lengan
        const model = document.getElementById("modelLengan").value;
        const hargaLengan = tambahanLengan[model] || 0;
        
        // Ukuran kaos (2XL,3XL,4XL)
        const ukuran = document.getElementById("ukuranKaos").value;
        const tambahanUkur = tambahanUkuran[ukuran] || 0;
        
        // Sablon depan dan belakang
        const sablonDepan = document.getElementById("ukuranSablonDepan").value;
        const sablonBelakang = document.getElementById("ukuranSablonBelakang").value;
        
        let biayaDepan = hargaSablon[sablonDepan] || 0;
        let biayaBelakang = hargaSablon[sablonBelakang] || 0;
        
        // Promo: Jika sablon belakang adalah A3 atau A4 DAN sablon depan adalah Logo, maka sablon depan gratis
        if ((sablonBelakang === "A3" || sablonBelakang === "A4") && sablonDepan === "Logo") {
            biayaDepan = 0;  // diskon Rp10.000
        }
        
        const total = hargaDasar + hargaLengan + tambahanUkur + biayaDepan + biayaBelakang;
        document.getElementById("totalHargaDisplay").innerText = `Total: Rp ${total.toLocaleString()}`;
        return total;
    }

    // Event listener untuk perubahan harga
    document.getElementById("jenisKaos").addEventListener("change", hitungTotal);
    document.getElementById("modelLengan").addEventListener("change", hitungTotal);
    document.getElementById("ukuranKaos").addEventListener("change", hitungTotal);
    document.getElementById("ukuranSablonDepan").addEventListener("change", hitungTotal);
    document.getElementById("ukuranSablonBelakang").addEventListener("change", hitungTotal);

    // Generate kode pesanan
    function generateOrderCode() {
        const now = new Date();
        const yy = now.getFullYear().toString().slice(-2);
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        return `CUST-${yy}${mm}${dd}-${random}`;
    }

    // Submit form
    document.getElementById("customForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const kode = generateOrderCode();
        const nama = document.getElementById("nama").value.trim();
        const nowa = document.getElementById("nowa").value.trim();
        const jenisKaos = document.getElementById("jenisKaos").value === "24s" ? "Cotton Combed 24s" : "Cotton Combed 30s";
        const modelLengan = document.getElementById("modelLengan").value === "pendek" ? "Lengan Pendek" : "Lengan Panjang (+Rp 8.000)";
        const warnaKaos = document.getElementById("warnaKaos").value.trim();
        
        let ukuranKaos = document.getElementById("ukuranKaos").value;
        let ukuranTeks = ukuranKaos || "Tidak pilih";
        if (ukuranKaos && tambahanUkuran[ukuranKaos]) {
            ukuranTeks += ` (+Rp ${tambahanUkuran[ukuranKaos].toLocaleString()})`;
        }
        
        const sablonDepan = document.getElementById("ukuranSablonDepan").value;
        const sablonBelakang = document.getElementById("ukuranSablonBelakang").value;
        
        // Format teks untuk WA, termasuk info promo jika berlaku
        let teksDepan = "";
        if (sablonDepan === "none") teksDepan = "Tidak ada";
        else if (sablonDepan === "Logo") {
            // Cek apakah promo berlaku
            if ((sablonBelakang === "A3" || sablonBelakang === "A4")) {
                teksDepan = "Logo (GRATIS karena belakang A3/A4)";
            } else {
                teksDepan = "Logo (Rp 10.000)";
            }
        } else {
            teksDepan = `${sablonDepan} (Rp ${hargaSablon[sablonDepan].toLocaleString()})`;
        }
        
        let teksBelakang = "";
        if (sablonBelakang === "none") teksBelakang = "Tidak ada";
        else teksBelakang = `${sablonBelakang} (Rp ${hargaSablon[sablonBelakang].toLocaleString()})`;
        
        const posisiDepan = document.getElementById("posisiDepan").value.trim();
        const posisiBelakang = document.getElementById("posisiBelakang").value.trim();
        const catatan = document.getElementById("catatan").value.trim();
        const totalHarga = hitungTotal();
        
        if (!nama || !nowa) {
            alert("Mohon isi nama dan nomor WhatsApp.");
            return;
        }
        
        let pesan = `*PERMINTAAN KUSTOMISASI SAMOJA*\n\n`;
        pesan += `Kode Pesanan: ${kode}\n`;
        pesan += `Nama: ${nama}\n`;
        pesan += `No. WhatsApp: ${nowa}\n\n`;
        pesan += `*Detail Produk:*\n`;
        pesan += `▸ Jenis Kaos: ${jenisKaos}\n`;
        pesan += `▸ Model Lengan: ${modelLengan}\n`;
        pesan += `▸ Warna Kaos: ${warnaKaos || "(tidak diisi)"}\n`;
        pesan += `▸ Ukuran Kaos: ${ukuranTeks}\n\n`;
        pesan += `*Detail Sablon:*\n`;
        pesan += `▸ Ukuran Depan: ${teksDepan}\n`;
        pesan += `▸ Ukuran Belakang: ${teksBelakang}\n`;
        pesan += `▸ Posisi Depan: ${posisiDepan || "(tidak diisi)"}\n`;
        pesan += `▸ Posisi Belakang: ${posisiBelakang || "(tidak diisi)"}\n\n`;
        if (catatan) pesan += `*Catatan:* ${catatan}\n\n`;
        pesan += `*Total Harga: Rp ${totalHarga.toLocaleString()}*\n\n`;
        pesan += `Mohon kirimkan gambar referensi desain via WhatsApp. Terima kasih.`;
        
        const adminWA = "6289512890115";
        const waUrl = `https://api.whatsapp.com/send?phone=${adminWA}&text=${encodeURIComponent(pesan)}`;
        window.open(waUrl, "_blank");
    });
    
    // Panggil hitungTotal saat halaman dimuat
    window.addEventListener("DOMContentLoaded", function() {
        hitungTotal();
    });
    
    fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d).catch(e=>console.error);
    fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d).catch(e=>console.error);
</script>
<script src="header.js"></script>
</body>
</html>
