<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Galeri</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--warna-utama);
        }
        .gallery-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .gallery-caption {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .empty-message i { font-size: 64px; color: var(--warna-utama); margin-bottom: 20px; }
        .lightbox {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 80vh; border-radius: 16px; }
        .lightbox .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="container">
    <div class="page-header">
        <h1>Galeri SAMOJA</h1>
        <p>Momen terbaik, koleksi, dan inspirasi</p>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
</div>

<div class="floating-social">
    <a href="https://wa.me/6289512890115" target="_blank" class="wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/samojaapprl/" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<div id="footer"></div>

<div id="lightbox" class="lightbox">
    <div class="close-lightbox">&times;</div>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption" style="margin-top:20px; color:white;"></div>
</div>

<script>
    const galleryItems = []; // isi nanti dengan { src: "Foto/...", caption: "..." }

    function renderGallery() {
        const grid = document.getElementById("gallery-grid");
        if (galleryItems.length === 0) {
            grid.innerHTML = `<div class="empty-message"><i class="fas fa-images"></i><h3>Belum Ada Foto</h3><p>Galeri SAMOJA sedang dalam persiapan.</p></div>`;
            return;
        }
        grid.innerHTML = "";
        galleryItems.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "gallery-item";
            div.innerHTML = `<img src="${item.src}" alt="${item.caption}"><div class="gallery-caption">${item.caption}</div>`;
            div.onclick = () => openLightbox(idx);
            grid.appendChild(div);
        });
    }
    function openLightbox(idx) {
        const item = galleryItems[idx];
        document.getElementById("lightbox-img").src = item.src;
        document.getElementById("lightbox-caption").innerText = item.caption;
        document.getElementById("lightbox").classList.add("active");
    }
    document.addEventListener("DOMContentLoaded", () => {
        renderGallery();
        const lb = document.getElementById("lightbox");
        document.querySelector(".close-lightbox").onclick = () => lb.classList.remove("active");
        lb.onclick = (e) => { if (e.target === lb) lb.classList.remove("active"); };
    });
    fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
    fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>
<script src="header.js"></script>
</body>
</html>
