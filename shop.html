<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Koleksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .produk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .produk-card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
            cursor: pointer;
        }
        .produk-card:hover {
            transform: translateY(-8px);
            border-color: var(--warna-utama);
        }
        .produk-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .produk-info {
            padding: 20px;
            text-align: center;
        }
        .produk-info h3 {
            font-size: 22px;
            margin: 0 0 8px;
        }
        .produk-info .harga {
            font-size: 20px;
            color: var(--warna-utama);
            font-weight: bold;
            margin: 10px 0;
        }
        .produk-info .deskripsi {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 20px;
        }
        .btn-pesan-produk {
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            border: 1px solid var(--warna-utama);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }
        .modal-gambar-dua {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .modal-gambar-dua img {
            flex: 1;
            min-width: 45%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, .jumlah-control {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
        }
        .jumlah-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 15px;
        }
        .jumlah-control button {
            background: var(--warna-utama);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        .harga-total {
            font-size: 24px;
            font-weight: bold;
            color: var(--warna-utama);
            text-align: center;
            margin: 20px 0;
        }
        .btn-kirim-wa {
            background: #25D366;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }
        .tabel-ukuran {
            margin-top: 15px;
            background: #0f0f0f;
            padding: 12px;
            border-radius: 16px;
            font-size: 12px;
            text-align: center;
        }
        .tabel-ukuran table {
            width: 100%;
            border-collapse: collapse;
        }
        .tabel-ukuran th, .tabel-ukuran td {
            border: 1px solid #333;
            padding: 8px;
        }
        .tabel-ukuran th {
            background: var(--warna-utama);
            color: white;
        }
        @media (max-width: 768px) {
            .modal-gambar-dua img { max-height: 200px; }
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="container">
    <div class="page-header">
        <h1>KOLEKSI SAMOJA</h1>
        <p>Klik produk untuk lihat detail & pesan</p>
    </div>
    <div class="produk-grid" id="produk-grid"></div>
</div>

<div id="footer"></div>

<!-- Modal -->
<div id="produkModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-gambar-dua">
            <img id="modal-img-depan" src="" alt="Depan">
            <img id="modal-img-belakang" src="" alt="Belakang">
        </div>
        <h2 id="modal-title"></h2>
        <div class="form-group">
            <label>Ukuran:</label>
            <select id="ukuran-select">
                <option value="S">S (Small)</option>
                <option value="M">M (Medium)</option>
                <option value="L">L (Large)</option>
                <option value="XL">XL (Extra Large)</option>
            </select>
            <div class="tabel-ukuran" id="tabel-ukuran"></div>
        </div>
        <div class="form-group">
            <label>Jumlah:</label>
            <div class="jumlah-control">
                <button id="kurangi">-</button>
                <span id="jumlah">1</span>
                <button id="tambah">+</button>
            </div>
        </div>
        <div class="harga-total">Total: <span id="total-harga">Rp 0</span></div>
        <button id="kirimWaBtn" class="btn-kirim-wa"> Pesan via WhatsApp</button>
    </div>
</div>

<div class="floating-social">
    <a href="https://wa.me/6289512890115" target="_blank" class="wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/samojaapprl/" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<script>
    const products = [
        { id: 1, nama: "Eren Yeager", harga: 89000, deskripsi: "Oversize, Cotton Combed 24'S", gambarDepan: "Foto/Eren Yeager/Depan.jpg", gambarBelakang: "Foto/Eren Yeager/Belakang.jpg" },
        { id: 2, nama: "RX-78-02 Gundam", harga: 89000, deskripsi: "Oversize, Cotton Combed 24'S", gambarDepan: "Foto/RX-78-02 Gundam/Depan.jpg", gambarBelakang: "Foto/RX-78-02 Gundam/Belakang.jpg" },
        { id: 3, nama: "Jiraiya", harga: 89000, deskripsi: "Oversize, Cotton Combed 24'S", gambarDepan: "Foto/Jiraiya/Depan.jpg", gambarBelakang: "Foto/Jiraiya/Belakang.jpg" }
    ];

    const sizeChart = {
        S: { "Lingkar Dada": "96 cm", "Panjang": "68 cm" },
        M: { "Lingkar Dada": "100 cm", "Panjang": "70 cm" },
        L: { "Lingkar Dada": "104 cm", "Panjang": "72 cm" },
        XL: { "Lingkar Dada": "108 cm", "Panjang": "74 cm" }
    };

    function renderSizeChart() {
        let html = `<table><thead><tr><th>Ukuran</th><th>Lingkar Dada</th><th>Panjang</th></tr></thead><tbody>`;
        for (const [size, data] of Object.entries(sizeChart)) {
            html += `<tr><td>${size}</td><td>${data["Lingkar Dada"]}</td><td>${data["Panjang"]}</td></tr>`;
        }
        html += `</tbody></table><div style="font-size:10px; margin-top:5px;">*Ukuran dapat berubah sesuai stok dan selisih 1-2 cm</div>`;
        document.getElementById("tabel-ukuran").innerHTML = html;
    }

    function renderProducts() {
        const grid = document.getElementById("produk-grid");
        grid.innerHTML = "";
        products.forEach(prod => {
            const card = document.createElement("div");
            card.className = "produk-card";
            card.innerHTML = `
                <img src="${prod.gambarDepan}" alt="${prod.nama}">
                <div class="produk-info">
                    <h3>${prod.nama}</h3>
                    <div class="harga">Rp ${prod.harga.toLocaleString()}</div>
                    <div class="deskripsi">${prod.deskripsi}</div>
                    <button class="btn-pesan-produk" data-id="${prod.id}">Pesan Sekarang</button>
                </div>
            `;
            card.addEventListener("click", (e) => {
                if (e.target.classList.contains("btn-pesan-produk")) return;
                openModal(prod.id);
            });
            card.querySelector(".btn-pesan-produk").addEventListener("click", (e) => {
                e.stopPropagation();
                openModal(prod.id);
            });
            grid.appendChild(card);
        });
    }

    let currentProduct = null, currentJumlah = 1, currentUkuran = "M";
    function openModal(id) {
        currentProduct = products.find(p => p.id === id);
        if (!currentProduct) return;
        currentJumlah = 1;
        currentUkuran = "M";
        document.getElementById("modal-img-depan").src = currentProduct.gambarDepan;
        document.getElementById("modal-img-belakang").src = currentProduct.gambarBelakang;
        document.getElementById("modal-title").innerText = currentProduct.nama;
        document.getElementById("jumlah").innerText = currentJumlah;
        document.getElementById("ukuran-select").value = currentUkuran;
        updateTotalHarga();
        renderSizeChart();
        document.getElementById("produkModal").style.display = "block";
    }
    function updateTotalHarga() {
        const total = currentProduct.harga * currentJumlah;
        document.getElementById("total-harga").innerText = `Rp ${total.toLocaleString()}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderProducts();
        renderSizeChart();
        const modal = document.getElementById("produkModal");
        const close = document.querySelector(".close-modal");
        const tambah = document.getElementById("tambah");
        const kurang = document.getElementById("kurangi");
        const ukuranSelect = document.getElementById("ukuran-select");
        const kirim = document.getElementById("kirimWaBtn");
        close.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
        tambah.onclick = () => { currentJumlah++; document.getElementById("jumlah").innerText = currentJumlah; updateTotalHarga(); };
        kurang.onclick = () => { if (currentJumlah > 1) { currentJumlah--; document.getElementById("jumlah").innerText = currentJumlah; updateTotalHarga(); } };
        ukuranSelect.onchange = (e) => { currentUkuran = e.target.value; renderSizeChart(); updateTotalHarga(); };
        kirim.onclick = () => {
            const pesan = `Halo SAMOJA, saya ingin memesan:\n\nProduk: ${currentProduct.nama}\nUkuran: ${currentUkuran}\nJumlah: ${currentJumlah}\nTotal: Rp ${(currentProduct.harga * currentJumlah).toLocaleString()}\n\nTerima kasih.`;
            window.open(`https://api.whatsapp.com/send?phone=6289512890115&text=${encodeURIComponent(pesan)}`, "_blank");
            modal.style.display = "none";
        };
    });

    fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
    fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
    document.addEventListener("contextmenu", e=>e.preventDefault());
</script>
<script src="header.js"></script>
</body>
</html>
