<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Koleksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Header/header.css">
    <link rel="stylesheet" href="Footer/footer.css">
    <style>
        /* ===== GAYA UMUM ===== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            background-image: linear-gradient(rgba(0, 0, 0, 0.70), rgba(0, 0, 0, 0.70)), url(background.png);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .shop-container {
            max-width: 1200px;
            margin: 100px auto 60px;
            padding: 20px;
        }
        .shop-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .shop-header h1 { font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }
        .shop-header p { font-size: 18px; color: #ccc; }

        /* ===== GRID PRODUK ===== */
        .produk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .produk-card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
            cursor: pointer;
        }
        .produk-card:hover { transform: translateY(-8px); border-color: #684f36; }
        .produk-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }
        .produk-info { padding: 20px; text-align: center; }
        .produk-info h3 { font-size: 22px; margin: 0 0 8px; }
        .produk-info .harga { font-size: 20px; color: white; font-weight: bold; margin: 10px 0; }
        .produk-info .deskripsi { font-size: 14px; color: #bbb; margin-bottom: 20px; }
        .btn-pesan-produk {
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-pesan-produk:hover { background-color: #20b858; }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            overflow: auto;
        }
        .modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            border: 1px solid #684f36;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }
        .close-modal:hover { color: white; }
        .modal-gambar-dua {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .modal-gambar-dua img {
            flex: 1;
            min-width: 45%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            background: #2a2a2a;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, .jumlah-control {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
        }
        .jumlah-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 15px;
        }
        .jumlah-control button {
            background: #684f36;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        .jumlah-control span { font-size: 20px; font-weight: bold; }
        .harga-total { font-size: 24px; font-weight: bold; color: white; text-align: center; margin: 20px 0; }
        .btn-kirim-wa {
            background: #25D366;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        /* Tabel ukuran tanpa atribut border */
        .tabel-ukuran {
            margin-top: 15px;
            background: #0f0f0f;
            padding: 12px;
            border-radius: 16px;
            font-size: 12px;
            text-align: center;
        }
        .tabel-ukuran table {
            width: 100%;
            border-collapse: collapse;
        }
        .tabel-ukuran th, .tabel-ukuran td {
            border: 1px solid #333;
            padding: 8px;
        }
        .tabel-ukuran th {
            background: #684f36;
            color: black;
        }

        /* Responsif */
        @media (max-width: 768px) {
            .shop-container { margin-top: 90px; }
            .shop-header h1 { font-size: 32px; }
            .modal-gambar-dua img { max-height: 200px; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="header"></div>
<div class="shop-container">
    <div class="shop-header">
        <h1>KOLEKSI SAMOJA</h1>
        <p>Klik produk untuk lihat detail & pesan</p>
    </div>
    <div class="produk-grid" id="produk-grid"></div>
</div>
<div id="footer"></div>

<!-- MODAL -->
<div id="produkModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-gambar-dua">
            <img id="modal-img-depan" src="" alt="Tampak Depan">
            <img id="modal-img-belakang" src="" alt="Tampak Belakang">
        </div>
        <h2 id="modal-title" style="margin-top:0; margin-bottom:15px;"></h2>
        <div class="form-group">
            <label>Ukuran:</label>
            <select id="ukuran-select">
                <option value="S">S (Small)</option>
                <option value="M">M (Medium)</option>
                <option value="L">L (Large)</option>
                <option value="XL">XL (Extra Large)</option>
            </select>
            <div class="tabel-ukuran" id="tabel-ukuran"></div>
        </div>
        <div class="form-group">
            <label>Jumlah:</label>
            <div class="jumlah-control">
                <button id="kurangi">-</button>
                <span id="jumlah">1</span>
                <button id="tambah">+</button>
            </div>
        </div>
        <div class="harga-total">Total: <span id="total-harga">Rp 0</span></div>
        <button id="kirimWaBtn" class="btn-kirim-wa">📲 Pesan via WhatsApp</button>
    </div>
</div>

<script>
    // ========== DATA PRODUK ==========
    const products = [
        {
            id: 1,
            nama: "Eren Yeager",
            harga: 89000,
            deskripsi: "Oversize, cotton combed 30s, sablon premium",
            gambarDepan: "Product/Eren Yeager/Depan.jpg",
            gambarBelakang: "Product/Eren Yeager/Belakang.jpg"
        },
        {
            id: 2,
            nama: "RX-78-02 Gundam",
            harga: 89000,
            deskripsi: "Standar fit, desain mecha klasik",
            gambarDepan: "Product/RX-78-02 Gundam/Depan.jpg",
            gambarBelakang: "Product/RX-78-02 Gundam/Belakang.jpg"
        },
        {
            id: 3,
            nama: "Jiraiya",
            harga: 89000,
            deskripsi: "Desain legendary shinobi, bahan adem",
            gambarDepan: "Product/Jiraiya/Depan.jpg",
            gambarBelakang: "Product/Jiraiya/Belakang.jpg"
        }
    ];

    // Tabel ukuran statis (tidak bisa diubah)
    const sizeChart = {
        S: { "Lingkar Dada": "96 cm", "Panjang": "68 cm" },
        M: { "Lingkar Dada": "100 cm", "Panjang": "70 cm" },
        L: { "Lingkar Dada": "104 cm", "Panjang": "72 cm" },
        XL: { "Lingkar Dada": "108 cm", "Panjang": "74 cm" }
    };

    function renderSizeChart() {
        const container = document.getElementById("tabel-ukuran");
        // Tidak menggunakan atribut border di <table>, hanya CSS
        let html = `<table>
            <thead>
                <tr><th>Ukuran</th><th>Lingkar Dada</th><th>Panjang</th></tr>
            </thead>
            <tbody>`;
        for (const [size, data] of Object.entries(sizeChart)) {
            html += `<tr><td>${size}</td><td>${data["Lingkar Dada"]}</td><td>${data["Panjang"]}</td></tr>`;
        }
        html += `</tbody>
        </table>
        <div style="font-size:10px; margin-top:5px;">*Ukuran dapat berubah sesuai stok</div>`;
        container.innerHTML = html;
    }

    function renderProducts() {
        const grid = document.getElementById("produk-grid");
        grid.innerHTML = "";
        products.forEach(prod => {
            const card = document.createElement("div");
            card.className = "produk-card";
            card.innerHTML = `
                <img src="${prod.gambarDepan}" alt="${prod.nama}">
                <div class="produk-info">
                    <h3>${prod.nama}</h3>
                    <div class="harga">Rp ${prod.harga.toLocaleString()}</div>
                    <div class="deskripsi">${prod.deskripsi}</div>
                    <button class="btn-pesan-produk" data-id="${prod.id}">Pesan Sekarang</button>
                </div>
            `;
            // Klik pada kartu (area mana saja) buka modal, kecuali tombol
            card.addEventListener("click", (e) => {
                if (e.target.classList.contains("btn-pesan-produk")) return;
                openModal(prod.id);
            });
            // Tombol pesan juga buka modal
            const btn = card.querySelector(".btn-pesan-produk");
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                openModal(prod.id);
            });
            grid.appendChild(card);
        });
    }

    let currentProduct = null;
    let currentJumlah = 1;
    let currentUkuran = "M";

    function openModal(productId) {
        currentProduct = products.find(p => p.id === productId);
        if (!currentProduct) return;
        currentJumlah = 1;
        currentUkuran = "M";
        document.getElementById("modal-img-depan").src = currentProduct.gambarDepan;
        document.getElementById("modal-img-belakang").src = currentProduct.gambarBelakang;
        document.getElementById("modal-title").innerText = currentProduct.nama;
        document.getElementById("jumlah").innerText = currentJumlah;
        document.getElementById("ukuran-select").value = currentUkuran;
        updateTotalHarga();
        renderSizeChart();
        document.getElementById("produkModal").style.display = "block";
    }

    function updateTotalHarga() {
        const total = currentProduct.harga * currentJumlah;
        document.getElementById("total-harga").innerText = `Rp ${total.toLocaleString()}`;
    }

    // Inisialisasi setelah halaman siap
    document.addEventListener("DOMContentLoaded", () => {
        renderProducts();
        renderSizeChart();

        const modal = document.getElementById("produkModal");
        const closeBtn = document.querySelector(".close-modal");
        const tambah = document.getElementById("tambah");
        const kurang = document.getElementById("kurangi");
        const ukuranSelect = document.getElementById("ukuran-select");
        const kirim = document.getElementById("kirimWaBtn");

        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

        tambah.onclick = () => {
            currentJumlah++;
            document.getElementById("jumlah").innerText = currentJumlah;
            updateTotalHarga();
        };
        kurang.onclick = () => {
            if (currentJumlah > 1) {
                currentJumlah--;
                document.getElementById("jumlah").innerText = currentJumlah;
                updateTotalHarga();
            }
        };
        ukuranSelect.onchange = (e) => {
            currentUkuran = e.target.value;
            renderSizeChart();  // hanya untuk memperbarui tampilan tabel (tidak ada perubahan data)
            updateTotalHarga();
        };
        kirim.onclick = () => {
            if (!currentProduct) return;
            const pesan = `Halo SAMOJA, saya ingin memesan:\n\nProduk: ${currentProduct.nama}\nUkuran: ${currentUkuran}\nJumlah: ${currentJumlah}\nTotal: Rp ${(currentProduct.harga * currentJumlah).toLocaleString()}\n\nTerima kasih.`;
            window.open(`https://api.whatsapp.com/send?phone=6289512890115&text=${encodeURIComponent(pesan)}`, "_blank");
            modal.style.display = "none";
        };
    });
</script>

<script>
    // Memuat header dan footer
    fetch("Header/header.html").then(r => r.text()).then(d => document.getElementById("header").innerHTML = d).catch(e => console.log("Header gagal dimuat"));
    fetch("Footer/footer.html").then(r => r.text()).then(d => document.getElementById("footer").innerHTML = d).catch(e => console.log("Footer gagal dimuat"));
    document.addEventListener("contextmenu", e => e.preventDefault());
</script>
<script src="Header/header.js"></script>
</body>
</html>
