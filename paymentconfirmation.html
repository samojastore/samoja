<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAMOJA - Konfirmasi Pembayaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .form-box {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 30px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            margin-bottom: 15px;
        }
        .btn-submit {
            background: var(--warna-utama);
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .info-wa {
            text-align: center;
            margin-top: 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="header"></div>

<div class="container">
    <div class="page-header">
        <h1>Konfirmasi Pembayaran</h1>
        <p>Isi form berikut untuk konfirmasi transfer via WhatsApp</p>
    </div>
    <div class="form-box">
        <form id="paymentForm">
            <div class="form-group"><input type="text" id="nama" placeholder="Nama Lengkap" required></div>
            <div class="form-group"><input type="text" id="orderId" placeholder="Nomor Pesanan (opsional)"></div>
            <div class="form-group"><select id="bank" required><option value="">Pilih Bank</option><option>BCA</option><option>Mandiri</option><option>BNI</option><option>BRI</option></select></div>
            <div class="form-group"><input type="number" id="jumlah" placeholder="Jumlah Transfer" required></div>
            <div class="form-group"><input type="date" id="tanggal"></div>
            <div class="form-group"><textarea id="catatan" placeholder="Catatan tambahan"></textarea></div>
            <button type="submit" class="btn-submit">Kirim via WhatsApp</button>
        </form>
    </div>
    <div class="info-wa">
        <i class="fab fa-whatsapp" style="font-size:40px; color:#25D366;"></i>
        <p>Atau kirim manual beserta foto bukti transfer</p>
        <a href="https://wa.me/6289512890115" target="_blank" class="btn-wa" style="background:#25D366; display:inline-block; padding:10px 20px; border-radius:40px; color:white; text-decoration:none;">Chat Admin</a>
    </div>
</div>

<div class="floating-social">
    <a href="https://wa.me/6289512890115" target="_blank" class="wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/samojaapprl/" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<div id="footer"></div>

<script>
    document.getElementById("paymentForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const nama = document.getElementById("nama").value;
        const orderId = document.getElementById("orderId").value;
        const bank = document.getElementById("bank").value;
        const jumlah = document.getElementById("jumlah").value;
        const tanggal = document.getElementById("tanggal").value;
        const catatan = document.getElementById("catatan").value;
        let pesan = `*KONFIRMASI PEMBAYARAN SAMOJA*\n\nNama: ${nama}\n`;
        if (orderId) pesan += `No. Pesanan: ${orderId}\n`;
        pesan += `Bank: ${bank}\nJumlah: Rp ${parseInt(jumlah).toLocaleString()}\n`;
        if (tanggal) pesan += `Tgl Transfer: ${tanggal}\n`;
        if (catatan) pesan += `Catatan: ${catatan}\n`;
        pesan += `\n*Kirim foto bukti transfer setelah pesan ini.*`;
        window.open(`https://api.whatsapp.com/send?phone=6289512890115&text=${encodeURIComponent(pesan)}`, "_blank");
    });
    fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
    fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>
<script src="header.js"></script>
</body>
</html>
